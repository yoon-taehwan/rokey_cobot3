# Initial robot descriptor for Doosan M0609
# Derived from the supplied m0609 URDF joint/link naming and limits.
# Collision spheres are approximate seed values for RMPflow self-collision.

api_version: 1.0

cspace:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6

root_link: base_link

default_q: [0.0, -1.5708, 1.5708, 0.0, 0.0, 0.0]

acceleration_limits: [8.0, 8.0, 10.0, 12.0, 12.0, 12.0]
jerk_limits: [4000.0, 4000.0, 5000.0, 6000.0, 6000.0, 6000.0]

# No cspace_to_urdf_rules are needed because all generalized coordinates map
# directly to URDF joints.

collision_spheres:
    - base_link:
        - "center": [0.0, 0.0, 0.07]
          "radius": 0.10
        - "center": [0.0, 0.0, 0.15]
          "radius": 0.09

    - link_1:
        - "center": [0.0, 0.0, 0.03]
          "radius": 0.08
        - "center": [0.0, 0.03, 0.00]
          "radius": 0.08

    - link_2:
        - "center": [0.10, 0.00, 0.04]
          "radius": 0.08
        - "center": [0.20, 0.00, 0.09]
          "radius": 0.07
        - "center": [0.31, 0.00, 0.12]
          "radius": 0.07
        - "center": [0.39, 0.00, 0.15]
          "radius": 0.06

    - link_3:
        - "center": [0.0, 0.0, 0.04]
          "radius": 0.07
        - "center": [0.0, -0.01, 0.09]
          "radius": 0.06

    - link_4:
        - "center": [0.0, 0.05, -0.05]
          "radius": 0.07
        - "center": [0.0, 0.10, -0.14]
          "radius": 0.07
        - "center": [0.0, 0.16, -0.23]
          "radius": 0.06
        - "center": [0.0, 0.24, -0.31]
          "radius": 0.06

    - link_5:
        - "center": [0.0, 0.00, 0.02]
          "radius": 0.06
        - "center": [0.0, 0.00, 0.06]
          "radius": 0.05

    - link_6:
        - "center": [0.0, 0.00, -0.03]
          "radius": 0.05
        - "center": [0.0, 0.00, -0.07]
          "radius": 0.045

    - tool0:
        - "center": [0.0, 0.0, 0.00]
          "radius": 0.1