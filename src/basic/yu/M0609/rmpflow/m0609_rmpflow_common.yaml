# Initial RMPflow common config for Doosan M0609
# Adapted from the Franka example, but resized/tuned for a 6-DOF industrial arm.
# This is a practical starting point and may still need tuning for your exact tool,
# controller gains, and desired motion aggressiveness.

joint_limit_buffers: [0.02, 0.05, 0.03, 0.03, 0.03, 0.03]

rmp_params:
    cspace_target_rmp:
        metric_scalar: 50.
        position_gain: 100.
        damping_gain: 50.
        robust_position_term_thresh: 0.5
        inertia: 1.
    cspace_trajectory_rmp:
        p_gain: 100.
        d_gain: 10.
        ff_gain: 0.25
        weight: 50.
    cspace_affine_rmp:
        final_handover_time_std_dev: 0.25
        weight: 2000.
    joint_limit_rmp:
        metric_scalar: 1000.
        metric_length_scale: 0.01
        metric_exploder_eps: 1e-3
        metric_velocity_gate_length_scale: 0.01
        accel_damper_gain: 200.
        accel_potential_gain: 1.
        accel_potential_exploder_length_scale: 0.1
        accel_potential_exploder_eps: 1e-2
    joint_velocity_cap_rmp:
        max_velocity: 3.927
        velocity_damping_region: 1.2
        damping_gain: 1000.0
        metric_weight: 100.
    target_rmp:
        accel_p_gain: 30.
        accel_d_gain: 85.
        accel_norm_eps: 0.075
        metric_alpha_length_scale: 0.05
        min_metric_alpha: 0.01
        max_metric_scalar: 10000
        min_metric_scalar: 2500
        proximity_metric_boost_scalar: 20.
        proximity_metric_boost_length_scale: 0.03
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    axis_target_rmp:
        accel_p_gain: 210.
        accel_d_gain: 60.
        metric_scalar: 10
        proximity_metric_boost_scalar: 3000.
        proximity_metric_boost_length_scale: 0.08
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    collision_rmp:
        damping_gain: 50.
        damping_std_dev: 0.04
        damping_robustness_eps: 1e-2
        damping_velocity_gate_length_scale: 0.01
        repulsion_gain: 800.
        repulsion_std_dev: 0.02
        metric_modulation_radius: 0.5
        metric_scalar: 10000.
        metric_exploder_std_dev: 0.02
        metric_exploder_eps: 0.001
    damping_rmp:
        accel_d_gain: 30.
        metric_scalar: 50.
        inertia: 100.

canonical_resolve:
    max_acceleration_norm: 20.
    projection_tolerance: 0.01
    verbose: false

body_cylinders:
    - name: base_column
      pt1: [0.0, 0.0, 0.00]
      pt2: [0.0, 0.0, 0.1345]
      radius: 0.11
    - name: shoulder_guard
      pt1: [0.0, 0.0, 0.10]
      pt2: [0.0, 0.0, 0.18]
      radius: 0.14

body_collision_controllers:
    - name: link_3
      radius: 0.06
    - name: link_4
      radius: 0.06
    - name: link_5
      radius: 0.05
    - name: link_6
      radius: 0.02
    - name: tool0
      radius: 0.02
